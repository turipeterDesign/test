<!-- HERO -->
<div class="hero" id="hero">
    <canvas id="gridCanvas"></canvas>

    <div class="hero-overlay"></div>

    <div class="hero-content">
        <h1>Turi Péter</h1>
        <p>Informatika tanár • Digitális tudás minden korosztálynak</p>
    </div>
</div>

<style>
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
    background: #0f2027;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

#gridCanvas {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* sötét overlay a jobb olvashatóságért */
.hero-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
}

.hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    animation: fadeIn 1.5s ease;
}

.hero h1 {
    font-size: 3em;
}

.hero p {
    opacity: 0.8;
}

/* glow effekt */
.hero::after {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(106,176,163,0.25), transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 6s infinite alternate;
}

@keyframes pulse {
    from { transform: translate(-50%, -50%) scale(0.8);}
    to { transform: translate(-50%, -50%) scale(1.2);}
}
</style>

<script>
const canvas = document.getElementById("gridCanvas");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let offset = 0;

function drawGrid() {
    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = "rgba(106,176,163,0.25)";
    ctx.lineWidth = 1;

    let perspective = 0.002;

    for (let y = 0; y < h; y += 40) {
        ctx.beginPath();
        for (let x = 0; x < w; x += 40) {
            let dx = x - w/2;
            let dy = y - h/2 + offset;

            let scale = 1 / (1 + dy * perspective);

            let px = w/2 + dx * scale;
            let py = h/2 + dy * scale;

            ctx.lineTo(px, py);
        }
        ctx.stroke();
    }

    offset += 1.5;
    requestAnimationFrame(drawGrid);
}

drawGrid();

/* egérre finom mozgás */
document.addEventListener("mousemove", (e) => {
    let x = (e.clientX / w - 0.5) * 20;
    let y = (e.clientY / h - 0.5) * 20;

    canvas.style.transform = `translate(${x}px, ${y}px)`;
});
</script>
